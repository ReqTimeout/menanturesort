<head>
  <!-- for optimal display on high DPI devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css" />
</head>

<!-- the viewer container must have a defined size -->
<div id="viewer" style="width: 100vw; height: 100vh;"></div>

<script type="importmap">
  {
      "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three/build/three.module.js",
          "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.module.js"
      }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/autorotate-plugin@5.8.3/index.module.min.js"></script>
<script type="module">
    import { Viewer } from '@photo-sphere-viewer/core';
    import { AutorotatePlugin } from 'https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/autorotate-plugin@5.8.3/index.module.min.js';


  const viewer = new Viewer({
      container: document.querySelector('#viewer'),
      panorama: 'panorama-main.webp',
      caption: 'View 360 <b>Menantu Resort</b>',
      touchmoveTwoFingers: true,
      mousewheelCtrlKey: true,
      plugins: [
      [AutorotatePlugin, {
        autostartDelay: 8000,
        autorotatePitch: '-5deg',
        }],
    ],
});

</script>
